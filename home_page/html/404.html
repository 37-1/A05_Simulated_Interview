<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found</title>
    <link rel="icon" href="favicon.png" type="image/png">


    <link rel="preload" href="assets/vendors/swiper/swiper-bundle.min.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="assets/vendors/swiper/swiper-bundle.min.css">
    </noscript>
    <link rel="preload" href="assets/vendors/bootstrap/css/bootstrap.min.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="assets/vendors/bootstrap/css/bootstrap.min.css">
    </noscript>
    <link rel="preload" href="assets/vendors/fontawesome/css/all.min.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="assets/vendors/fontawesome/css/all.min.css">
    </noscript>
    <link rel="stylesheet" href="assets/vendors/fonts/poppins/poppins.css">
    <link rel="preload" href="assets/vendors/aos/css/aos.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="assets/vendors/aos/css/aos.css">
    </noscript>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="light-mode">
    <div id="snowfall-container"></div>
    <section class="not-found-section d-flex align-items-center justify-content-center text-center">
        <div class="container" data-aos="fade-up">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-subtitle text-white-50">
                Oops! The page you are looking for might have been removed, had its name changed, or is temporarily
                unavailable.
            </p>
            <a href="index.html" class="btn btn-primary btn-lg mt-4">Go to Homepage</a>
        </div>
    </section>

    <button class="snowfall-toggle-btn" id="snowfall-toggle-btn" aria-label="Toggle Snowfall Effect">
        <i class="fas fa-power-off"></i>
    </button>

    <script src="assets/vendors/swiper/swiper-bundle.min.js" defer></script>
    <script src="assets/vendors/bootstrap/js/bootstrap.bundle.min.js" defer></script>
    <script src="assets/vendors/aos/js/aos.js" defer></script>
    <script src="assets/js/main.js" defer></script>

</body>

</html>
