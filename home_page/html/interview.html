<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtu Prep - 模拟面试</title>
    <link rel="icon" href="生成特定风格图片.png" type="image/png">
    
    <!-- Preload fonts and critical CSS -->
    <link rel="preload" href="assets/vendors/bootstrap/css/bootstrap.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="assets/vendors/bootstrap/css/bootstrap.min.css"></noscript>
    <link rel="stylesheet" href="assets/vendors/fonts/poppins/poppins.css">
    <link rel="preload" href="assets/vendors/fontawesome/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="assets/vendors/fontawesome/css/all.min.css"></noscript>
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/interview.css">
</head>

<body>
    <!-- Accessibility Skip Link -->
    <a href="#main-content" class="visually-hidden-focusable">跳到主要内容</a>

    <div class="interview-layout">
        <!-- Top Header -->
        <header class="interview-header" role="banner">
            <div class="header-left">
                <a href="index.html" class="logo" aria-label="返回首页">
                    <span class="logo-main">Virtu</span><span class="logo-secondary" style="font-size: 1.5em;">Prep</span>
                </a>
            </div>
            <div class="header-center">
                <div class="timer-box" aria-live="polite">
                    面试时间 <span id="interview-timer">00:00</span>
                </div>
            </div>
            <div class="header-right">
                <button class="btn btn-outline-primary header-btn" aria-label="面试设置" title="面试设置">
                    <i class="fas fa-cog" aria-hidden="true"></i> 面试设置
                </button>
                <button class="btn btn-primary header-btn" aria-label="开始面试" title="开始面试" id="end-interview-btn">
                    <i class="fas fa-play" aria-hidden="true" id="interview-btn-icon"></i> <span id="interview-btn-text">开始面试</span>
                </button>
                <div class="theme-toggle-container">
                    <button id="theme-toggle-btn" class="theme-toggle-btn" aria-label="切换深色/浅色模式">
                        <i class="fas fa-moon" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content Grid -->
        <main id="main-content" class="interview-main" role="main">
            <!-- Left Column -->
            <section class="panel-left">
                <div class="panel-section top-section">
                    <div class="card video-card" tabindex="0" aria-label="面试者录像框">
                        <div class="card-content">
                            <i class="fas fa-user-circle placeholder-icon" aria-hidden="true"></i>
                            <span>面试者录像框</span>
                        </div>
                    </div>
                </div>
                <div class="panel-divider" aria-hidden="true"></div>
                <div class="panel-section bottom-section">
                    <div class="card analysis-card" tabindex="0" aria-label="AI 分析">
                        <div class="card-header">AI 分析</div>
                        <div class="card-content analysis-content">
                            <!-- AI Analysis Content goes here -->
                            <p class="placeholder-text">分析数据加载中...</p>
                        </div>
                    </div>
                </div>
            </section>

            <div class="vertical-divider" aria-hidden="true"></div>

            <!-- Center Column -->
            <section class="panel-center">
                <div class="interviewer-profile card" tabindex="0" aria-label="面试官信息">
                    <div class="profile-avatar">
                        <i class="fas fa-robot" aria-hidden="true"></i>
                    </div>
                    <div class="profile-name">面试官：AI 导师</div>
                </div>
                
                <div class="chat-history card" tabindex="0" aria-label="面试官的问题及其他交流" aria-live="polite">
                    <div class="card-header visually-hidden">交流记录</div>
                    <div class="chat-messages">
                        <!-- Chat messages will be dynamically added here -->
                        <div class="message interviewer">
                            <div class="message-content">你好！我是你的面试官。请先做个简单的自我介绍吧。</div>
                        </div>
                    </div>
                </div>

                <div class="answer-box card">
                    <div class="card-header visually-hidden">面试者的回答框</div>
                    <textarea class="answer-input" placeholder="请输入你的回答..." aria-label="在此输入你的回答"></textarea>
                    <div class="answer-actions">
                        <button class="btn btn-outline-secondary action-btn" id="clear-answer-btn" aria-label="清空回答" title="清空" style="display: none; margin-right: auto;">
                            清空 <i class="fas fa-trash-alt" aria-hidden="true"></i>
                        </button>
                        <button class="btn btn-secondary action-btn" id="mic-btn" aria-label="开启语音输入" title="语音输入">
                            <i class="fas fa-microphone" aria-hidden="true" id="mic-icon"></i>
                        </button>
                        <button class="btn btn-primary action-btn" aria-label="发送回答" title="发送">
                            发送 <i class="fas fa-paper-plane" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
            </section>

            <div class="vertical-divider" aria-hidden="true"></div>

            <!-- Right Column -->
            <section class="panel-right">
                <div class="card history-card" tabindex="0" aria-label="历史记录">
                    <div class="card-header">历史记录</div>
                    <div class="card-content history-content">
                        <!-- History list goes here -->
                        <ul class="history-list">
                            <li>已回答问题 1</li>
                            <li>等待提问...</li>
                        </ul>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for returning home -->
    <div id="return-home-modal" class="modal-overlay" style="display: none;" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
        <div class="modal-content enhanced-modal">
            <div class="modal-header">
                <div class="modal-icon"><i class="fas fa-pause-circle" aria-hidden="true"></i></div>
                <h3 id="modal-title">面试已暂停</h3>
            </div>
            <p class="modal-desc">请选择接下来的操作：</p>
            <div class="modal-actions-vertical">
                <button id="modal-confirm-btn" class="btn btn-primary modal-btn">
                    <i class="fas fa-home" aria-hidden="true"></i> 返回主页
                </button>
                <button id="modal-review-btn" class="btn btn-info modal-btn" style="color: white;">
                    <i class="fas fa-chart-line" aria-hidden="true"></i> 本次复盘
                </button>
                <button id="modal-cancel-btn" class="btn btn-outline-secondary modal-btn">
                    <i class="fas fa-undo" aria-hidden="true"></i> 取消并重置
                </button>
            </div>
        </div>
    </div>

    <script src="assets/js/interview.js" defer></script>
</body>
</html>
